<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZQQET MASTER SYSTEM - GLOBAL</title>
</head>
<body>
<div class="rfof-blockchain-system">
    <div class="system-header">
        <h2>RFOF MAINNET ALPHA v6.0</h2>
        <div id="global-timer" class="neon-text">TARGET: 14.08.2026</div>
    </div>

    <div id="auth-layer" class="module">
        <div class="label">SECURITY ACCESS</div>
        <input type="password" id="seed-phrase" placeholder="12-Wort Phrase..." class="rfof-input">
        <div class="btn-group">
            <button onclick="vault.access()">LOGIN / SYNC</button>
            <button onclick="vault.generate()" style="background:var(--magenta)">NEW VAULT</button>
        </div>
    </div>

    <div id="dashboard" class="module" style="display:none">
        <div class="wallet-head">
            <span id="display-addr">0x...</span>
            <button onclick="vault.logout()" class="small-btn">LOCK</button>
        </div>
        <div class="balance-grid">
            <div class="b-box">ECCU: <span id="bal-eccu">0.00</span></div>
            <div class="b-box">EURO: <span id="bal-euro">0.00 €</span></div>
        </div>
        <button id="mint-trigger" class="main-action">EXECUTE PZQQET MINT (J)</button>
    </div>

    <div class="eccu-master-container" id="prai-core-root" style="border: 2px solid #00f2ff; background: #000; padding: 20px; color: #fff; border-radius: 8px; margin-top: 20px;">
        <div style="border-bottom: 2px solid #222; padding-bottom: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="font-size: 1.1rem; color: #00f2ff; font-weight: bold;">PZQQET MASTER CORE v42</div>
                <button id="view-toggle-btn" onclick="toggleView()" style="display:none; background: #111; color: #00ff41; border: 1px solid #00ff41; font-size: 0.6rem; padding: 2px 5px; cursor: pointer;">ADMIN VIEW</button>
            </div>
            <div id="view-admin" style="display: none; border: 2px dashed #00ff41; padding: 15px; margin-top:10px;">
                <div style="color: #00ff41; margin-bottom: 5px;">[ADMIN CONSOLE]</div>
                <input type="text" id="asset-name" placeholder="Asset Name..." style="width: 100%; background: #000; color: #fff; border: 1px solid #00ff41;">
                <button onclick="adminDeploy()" style="width: 100%; margin-top: 5px; background: #00ff41; color:#000; font-weight:bold;">DEPLOY (SHA256)</button>
                <div id="sync-signature" style="font-size: 0.5rem; margin-top: 10px; color: #00f2ff; word-break: break-all;"></div>
            </div>
        </div>
        <div id="view-user" style="display: block; margin-top: 10px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="border: 1px solid #333; padding: 5px;">RFOF: <span id="u-rfof">0.00</span></div>
                <div style="border: 1px solid #333; padding: 5px;">PRAI: <span id="u-prai">0.00</span></div>
            </div>
        </div>
    </div>
    
    <div class="module explorer">
        <div class="label">BLOCKCHAIN EXPLORER</div>
        <div id="blockchain-track" class="chain-visual"></div>
    </div>
</div>

<style>
    :root { --neon: #00f2ff; --magenta: #ff00ff; --bg: #000; --text: #fff; }
    body { background: #050505; color: var(--text); font-family: monospace; }
    .rfof-blockchain-system { max-width: 600px; margin: auto; padding: 20px; }
    .module { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    .main-action { width: 100%; padding: 15px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; }
    .chain-visual { display: flex; gap: 10px; overflow-x: auto; padding: 10px; border: 1px solid #222; }
    .block-unit { min-width: 50px; height: 50px; border: 1px solid var(--neon); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
</style>

<script>
    const MASTER_ADMIN = "RFOF-46D65B1C4A8A4FA3E3B6";
    
    // Core Engine
    const vault = {
        access: async () => {
            const seed = document.getElementById('seed-phrase').value;
            const addr = "RFOF-" + (await crypto.subtle.digest('SHA-256', new TextEncoder().encode(seed)))
                .then(buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16)).join('').substring(0, 20).toUpperCase());
            localStorage.setItem("current_wallet_address", addr);
            location.reload();
        },
        logout: () => { localStorage.removeItem("current_wallet_address"); location.reload(); },
        generate: () => alert("NEUER VAULT ERSTELLT.")
    };

    function toggleView() {
        const vA = document.getElementById('view-admin');
        vA.style.display = (vA.style.display === 'none') ? 'block' : 'none';
    }

    function adminDeploy() {
        const asset = document.getElementById('asset-name').value;
        document.getElementById('sync-signature').innerText = "DEPLOYED: " + asset + " | SIGNED";
    }

    // Init Check
    window.onload = () => {
        const addr = localStorage.getItem("current_wallet_address");
        if(addr) {
            document.getElementById('auth-layer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('display-addr').innerText = addr;
            if(addr === MASTER_ADMIN) document.getElementById('view-toggle-btn').style.display = 'block';
        }
    };
</script>
</body>
</html>
