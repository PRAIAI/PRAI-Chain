<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFOF MAINNET ALPHA v6.0</title>
    <style>
        :root { --neon: #00f2ff; --magenta: #ff00ff; --bg: #000; --text: #fff; }
        body { background: #050505; color: var(--text); font-family: monospace; padding: 20px; }
        .rfof-blockchain-system { background: var(--bg); color: var(--text); padding: 15px; border: 2px solid var(--neon); border-radius: 12px; font-family: monospace; max-width: 600px; margin: auto; }
        .module { background: #080808; border: 1px solid #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .rfof-input { width: 100%; padding: 8px; background: #000; border: 1px solid var(--neon); color: #fff; margin-bottom: 5px; box-sizing: border-box; }
        .main-action { width: 100%; padding: 15px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 5px; box-shadow: 0 0 10px var(--neon); }
        .chain-visual { display: flex; gap: 10px; overflow-x: auto; padding: 10px; }
        .block-unit { min-width: 60px; height: 60px; border: 1px solid var(--neon); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; font-size: 0.6rem; transition: 0.2s; }
        .block-unit:hover { border-color: #fff; transform: scale(1.05); }
        .details-view { font-size: 0.7rem; background: #000; padding: 10px; border: 1px solid #444; color: #00ff41; line-height: 1.4; white-space: pre-wrap; }
        .console-module { height: 80px; overflow-y: auto; background: #000; padding: 5px; font-size: 0.6rem; color: #00ff41; border: 1px solid #222; margin-top: 10px; }
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
        .b-box { background: #151515; padding: 10px; border: 1px solid #333; text-align: center; }
        .small-btn { font-size: 0.6rem; background: #333; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="rfof-blockchain-system">
    <div class="system-header">
        <h2>RFOF MAINNET ALPHA v6.0</h2>
        <div id="global-timer" class="neon-text">TARGET: 14.08.2026</div>
    </div>

    <div id="auth-layer" class="module">
        <div class="label">SECURITY ACCESS</div>
        <input type="password" id="seed-phrase" placeholder="12-Wort Phrase..." class="rfof-input">
        <div class="btn-group">
            <button onclick="vault.access()">LOGIN / SYNC</button>
            <button onclick="vault.generate()" style="background:var(--magenta)">NEW VAULT</button>
        </div>
    </div>

    <div id="dashboard" class="module" style="display:none">
        <div class="wallet-head">
            <span id="display-addr">0x...</span>
            <button onclick="vault.logout()" class="small-btn">LOCK</button>
        </div>
        <div class="balance-grid">
            <div class="b-box">ECCU: <span id="bal-eccu">0.00</span></div>
            <div class="b-box">EURO: <span id="bal-euro">0.00 €</span></div>
        </div>
        <button id="mint-trigger" class="main-action">EXECUTE PZQQET MINT (J)</button>
    </div>

    <div class="module explorer">
        <div class="label">BLOCKCHAIN EXPLORER (HEAD & BODY)</div>
        <div id="blockchain-track" class="chain-visual"></div>
    </div>

    <div id="inspector" class="module" style="display:none">
        <div class="label">BLOCK INSPECTOR</div>
        <div id="block-details" class="details-view"></div>
        <button onclick="ui.closeInspector()" class="small-btn">CLOSE</button>
    </div>

    <div class="console-module">
        <div id="console-logs"></div>
    </div>
</div>

<div class="eccu-master-container" id="prai-core-root" style="border: 2px solid #00f2ff; background: #000; padding: 20px; color: #fff; border-radius: 8px; margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto;">
    <div style="border-bottom: 2px solid #222; padding-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 1.1rem; color: #00f2ff; font-weight: bold;">PZQQET MASTER CORE v42</div>
            <button id="view-toggle-btn" onclick="toggleView()" style="display:none; background: #111; color: #00ff41; border: 1px solid #00ff41; font-size: 0.6rem; padding: 2px 5px; cursor: pointer;">ADMIN VIEW</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
            <span id="s-auth" style="font-size: 0.5rem; border: 1px solid #555; padding: 2px;">AUTH: LOGGED OUT</span>
            <span id="s-role" style="font-size: 0.5rem; border: 1px solid #555; padding: 2px;">ROLE: USER</span>
            <span id="s-rfof" style="font-size: 0.5rem; border: 1px solid #555; padding: 2px;">RFOF: IDLE</span>
            <span id="s-prai" style="font-size: 0.5rem; border: 1px solid #555; padding: 2px;">PRAI: IDLE</span>
            <span id="s-eccu" style="font-size: 0.5rem; border: 1px solid #555; padding: 2px;">ECCU: IDLE</span>
        </div>
    </div>
    <div id="core-viewport" style="margin-top: 20px;">
        <div id="view-user" style="display: block;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="border: 1px solid #333; padding: 5px;">RFOF: <span id="u-rfof">0.00</span></div>
                <div style="border: 1px solid #333; padding: 5px;">PRAI: <span id="u-prai">0.00</span></div>
                <div style="border: 1px solid #333; padding: 5px;">LP-TKN: <span id="u-lp">0.00</span></div>
            </div>
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <button onclick="txAction('DEPOSIT')" style="flex:1; background:#00ff41; color:#000; font-weight:bold;">IN</button>
                <button onclick="txAction('WITHDRAW')" style="flex:1; background:#ff00ff; color:#000; font-weight:bold;">OUT</button>
            </div>
        </div>
        <div id="view-admin" style="display: none; border: 2px dashed #00ff41; padding: 15px;">
            <div style="color: #00ff41; margin-bottom: 5px;">[ADMIN CONSOLE]</div>
            <input type="text" id="asset-name" placeholder="Asset Name..." style="width: 100%; background: #000; color: #fff;">
            <button onclick="adminDeploy()" style="width: 100%; margin-top: 5px; background: #00ff41; color:#000; font-weight:bold;">DEPLOY (SHA256)</button>
        </div>
    </div>
</div>

<script>
/* --- BACKEND & INTEGRATION --- */
const SystemController = {
    init() {
        if (!localStorage.getItem("chain_registry")) {
            localStorage.setItem("chain_registry", JSON.stringify({"RFOF": {balance: 0}, "PRAI": {balance: 0}, "ECCU": {balance: 0}}));
        }
        triggerReflexion();
    },
    terminate() { localStorage.setItem("last_sync", Date.now()); }
};
document.addEventListener("DOMContentLoaded", () => SystemController.init());
window.addEventListener("beforeunload", () => SystemController.terminate());

/* --- KERN-LOGIK --- */
const cryptoLib = { async hash(data) { const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data)); return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join(''); } };
let chain = JSON.parse(localStorage.getItem('rfof_chain')) || [];
const MASTER_ADMIN = "RFOF-46D65B1C4A8A4FA3E3B6";

const vault = {
    current: localStorage.getItem("current_wallet_address"),
    async access() {
        const seed = document.getElementById('seed-phrase').value;
        if(seed.length < 5) return;
        const addr = "RFOF-" + (await cryptoLib.hash(seed)).substring(0, 20).toUpperCase();
        localStorage.setItem("current_wallet_address", addr);
        location.reload();
    },
    generate() { alert("SPEICHERN:\n" + Array.from({length:12}, () => Math.random().toString(36).substring(2,7)).join(' ')); },
    logout() { localStorage.removeItem("current_wallet_address"); location.reload(); }
};

const engine = {
    async mint() {
        if(!vault.current) return;
        const block = { head: { index: chain.length, timestamp: Date.now() }, body: { miner: vault.current, amount: 0.00096093 } };
        chain.push(block);
        localStorage.setItem('rfof_chain', JSON.stringify(chain));
        ui.log("BLOCK MINED");
        location.reload();
    }
};

const ui = {
    showDashboard() { document.getElementById('auth-layer').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; },
    closeInspector() { document.getElementById('inspector').style.display = 'none'; },
    log(msg) { document.getElementById('console-logs').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + document.getElementById('console-logs').innerHTML; }
};

function txAction(type) {
    const amount = parseFloat(prompt("Betrag:"));
    if(isNaN(amount)) return;
    let reg = JSON.parse(localStorage.getItem("chain_registry"));
    reg['RFOF'].balance = (type === 'DEPOSIT') ? (parseFloat(reg['RFOF'].balance) + amount) : Math.max(0, reg['RFOF'].balance - amount);
    localStorage.setItem("chain_registry", JSON.stringify(reg));
    triggerReflexion();
}

function triggerReflexion() { ['RFOF','PRAI','ECCU'].forEach(id => { 
    const val = JSON.parse(localStorage.getItem("chain_registry"))[id]?.balance || 0; 
    const el = document.getElementById('u-'+id.toLowerCase()); 
    if(el) el.innerText = val.toFixed(2); 
})};

function toggleView() { document.getElementById('view-admin').style.display = (document.getElementById('view-admin').style.display === 'none') ? 'block' : 'none'; }

document.getElementById('mint-trigger').addEventListener('click', () => engine.mint());
</script>
</body>
</html>
